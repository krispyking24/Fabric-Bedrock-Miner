name: AutoRelease

on:
  push:
    branches: [ master ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: Artifacts
          path: ./build/libs

      - name: Unzip Artifact
        run: |
          echo "Unzipping artifact..."
          unzip -d ./extracted ./build/libs/Artifacts.zip
          ls -l ./extracted

      - name: Create and Push Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ github.run_number }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag $TAG_NAME
          git push origin $TAG_NAME

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_and_push_tag.outputs.tag }}
          release_name: "Release ${{ steps.create_and_push_tag.outputs.tag }}"
          body: |
            Changes in this release:
            - Add your changes here
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./extracted/*.jar
          asset_name: $(basename ./extracted/*.jar)
          asset_content_type: application/java-archive